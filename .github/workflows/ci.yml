name: ci

# Runs on every push to v1-port and main, and every pull_request.
# Required status check (configured via branch protection). When this
# workflow's `ci` job is red, no merge is allowed.
#
# Scope: cheap + deterministic. Typecheck + build + tests + parity harness.

on:
  push:
    branches: [main, v1-port]
  pull_request:
    branches: [main, v1-port]

# Cancel in-flight runs of the same workflow on the same ref when a new
# push comes in. Saves CI minutes on quick iteration.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      # Run vitest. The reporter-JSON-numTests check guards against
      # silent zero-tests-discovered failures.
      #
      # 2026-05-13: removed a `| tee /tmp/vitest-stdout.log` that
      # MASKED test failures — the pipeline's exit code was tee's
      # (always 0), so a failing `pnpm test` left this step green.
      # The log file was never consumed. Now: no pipe, explicit
      # `set -eo pipefail`, and the `default` reporter prints
      # progress to the CI log while `json` feeds the numTests guard.
      - name: Run unit tests
        run: |
          set -eo pipefail
          pnpm test --reporter=default --reporter=json --outputFile=/tmp/vitest-report.json
          numTests=$(node -e "const r=JSON.parse(require('fs').readFileSync('/tmp/vitest-report.json','utf8')); console.log(r.numTotalTests ?? 0)")
          if [ "$numTests" = "0" ]; then
            echo "FAIL: vitest discovered 0 tests"
            exit 1
          fi
          echo "vitest discovered $numTests tests"

      # Pack the package as users would receive it. Verifies the
      # tarball contains the expected files for direct-install
      # consumption.
      - name: Pack + smoke-extract tarball
        run: |
          set -eo pipefail
          pnpm pack --pack-destination /tmp/sc-pack
          tarball=$(ls /tmp/sc-pack/*.tgz | head -1)
          if [ -z "$tarball" ]; then
            echo "FAIL: pnpm pack produced no tarball"
            exit 1
          fi
          echo "Tarball: $tarball ($(du -h "$tarball" | cut -f1))"

          mkdir -p /tmp/sc-extract && tar -xzf "$tarball" -C /tmp/sc-extract
          for required in package/dist/src/index.js package/dist/openclaw.plugin.json; do
            if [ ! -f "/tmp/sc-extract/$required" ]; then
              echo "FAIL: tarball missing required file: $required"
              echo "Tarball contents:"
              tar -tzf "$tarball" | head -50
              exit 1
            fi
          done
          echo "Tarball contains required dist files."

          # Manifest sanity — ensure version + minHostVersion are present.
          node -e "
            const m = JSON.parse(require('fs').readFileSync('/tmp/sc-extract/package/dist/openclaw.plugin.json','utf8'));
            if (!m.id || !m.minHostVersion) {
              throw new Error('manifest missing id or minHostVersion: ' + JSON.stringify(m));
            }
            console.log('manifest id=' + m.id + ' minHostVersion=' + m.minHostVersion);
          "
